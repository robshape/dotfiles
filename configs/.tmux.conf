# ##################
# Configure settings
# ##################
# Improve window naming
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"
# Improve window numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
# Enable notifications
set -g bell-action other
setw -g monitor-bell on
# Use 256 colors
set -g default-terminal "screen-256color"
# Recognize <esc> immediately
set -gs escape-time 100
# Enable Vim-style copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
# Enable mouse
set -g mouse on
# Change prefix
unbind C-b
set -g prefix C-q
bind C-q send-prefix
# Customize status bar
set -g status-left " "
set -g status-right " "
# Change default path
bind-key c new-window -c "~/Developer/"
bind-key '"' split-window -c "#{pane_current_path}"
bind-key % split-window -hc "#{pane_current_path}"

# ############
# Map keyboard
# ############
# CTRL+a to cycle panes
bind-key -n C-a select-pane -t :.+
# CTRL+l to cycle windows
bind-key -n C-l next-window
# CTRL+z to zoom current pane
bind-key -n C-z resize-pane -Z
